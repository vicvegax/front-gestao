<custom-form (voltar)="onVoltarClick()" (salvar)="onSalvarClick()" [canSave]="form.valid" [loading]="loading()">
  <form [formGroup]="form" novalidate>
    <div class="grid grid-cols-6 gap-4">

      <mat-form-field appearance="fill" class="col-span-2">
        <mat-label>CPF</mat-label>
        <input matInput 
        formControlName="cpf" 
        mask="000.000.000-00"
        placeholder="___.___.___-__"
        required>
        @if(f.cpf.invalid && f.cpf.touched){
          <mat-error>Informe um CPF válido.</mat-error> 
        }
      </mat-form-field>

      <mat-form-field appearance="fill" class="col-span-full">
        <mat-label>Nome</mat-label>
        <input matInput formControlName="nome" toUppercase minlength="3">
        @if (form.controls['nome'].hasError('required')) {
          <mat-error>Nome é <strong>requerido</strong></mat-error>
        }
      </mat-form-field>

      @if(modoEditar()) {
        <mat-form-field class="col-span-3">
          <mat-label>Situação</mat-label>
          <mat-select formControlName="ativo" >
            <mat-select-trigger [class.texto-red]="form.get('ativo')?.value === false">
              {{ form.get('ativo')?.value ? 'ATIVO' : 'INATIVO' }}
            </mat-select-trigger>
            <mat-option [value]="true">ATIVO</mat-option>
            <mat-option [value]="false" class="texto-red">INATIVO</mat-option>
          </mat-select>
        </mat-form-field>
      }
    </div>
  </form>
</custom-form>
