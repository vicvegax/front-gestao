<custom-listagem
  [title]="showForm() ? 'Cadastro de Órgão' : 'Listagem de Órgãos'"
  [dataSource]="dataSource"
  [columns]="columns"
  [showForm]="showForm()"
  [loading]="loading()"
  (novo)="onNovoClick()"
  (editar)="onEditarClick($event)"
  (filtrar)="dataSource.filter = $event"
  [id]="registro?.id"
>
  <!-- Injeção do formulário específico -->
  <ng-template #form>
    <form-orgao 
      (voltar)="hideForm()" 
      (salvar)="onSalvar($event)" 
      [registro]="registro" 
      [loading]="loading()" />
  </ng-template>
</custom-listagem>
