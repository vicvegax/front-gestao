<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport
      [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
      [mode]="'over'"
      [opened]="false">
    <!-- <mat-toolbar class="mat-toolbar-logo"></mat-toolbar> -->
    <app-items-menu class="menu-list" (click)="onItemsMenuClick($event, drawer)"></app-items-menu>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar class="mat-toolbar-header">
      <!-- @if (isHandset$ | async) { -->
       <img src="solucao.png" class="logo" />
        <button
          type="button"
          aria-label="Toggle sidenav"
          matIconButton
          (click)="drawer.toggle()">
          <mat-icon aria-label="Side nav toggle icon">menu</mat-icon>
        </button>
      <!-- } -->
      <span>Solução{{ modoDev ? ' - DEV' : '' }}{{ usuario?.modoDev ? '(DB-DEV)' : '' }}</span>
      <span class="spacer"></span>
      <button mat-button [matMenuTriggerFor]="userMenu" class="user-menu-button">
        <mat-icon>account_circle</mat-icon>
        <span>{{ usuario?.nome }}</span>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="alterar-senha">
          <mat-icon>key</mat-icon>
          <span>Mudar Senha</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Logout</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <!-- Add Content Here -->
     <div class="home-container">
      <router-outlet />
     </div>
  </mat-sidenav-content>
</mat-sidenav-container>
